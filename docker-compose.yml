services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: calorie
      POSTGRES_PASSWORD: calorie
      POSTGRES_DB: calorie
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calorie"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://calorie:calorie@db:5432/calorie
      SECRET_KEY: change-me-to-a-long-random-string
      MOCK_AI: "true"
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o
      CORS_ORIGINS: http://localhost:5173
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
