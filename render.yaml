# Render Blueprint: provisions the FastAPI backend + a managed Postgres database.
# Deploy: push this repo to GitHub, then in Render -> "New +" -> "Blueprint",
# pick the repo. Render reads this file and creates everything below.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: nutrilens-db
    plan: free
    databaseName: calorie
    user: calorie

services:
  - type: web
    name: nutrilens-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nutrilens-db
          property: connectionString
      # Auto-generated secret used to sign JWTs.
      - key: SECRET_KEY
        generateValue: true
      # Keep canned AI data so the app works with no API key/cost.
      # Set to "false" and fill OPENAI_API_KEY to use the real model.
      - key: MOCK_AI
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      # Comma-separated allowed origins. Set this to your Vercel web URL
      # (e.g. https://nutrilens.vercel.app) after the frontend is deployed.
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: /app/uploads
